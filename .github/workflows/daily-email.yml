name: Daily Tweet Preview Email

on:
  schedule:
    - cron: '0 15 * 4,5,6,7,8,9,10 *'   # 4pm BST (Apr–Oct)
    - cron: '0 16 * 11,12,1,2,3 *'       # 4pm GMT (Nov–Mar)
  workflow_dispatch:       # allow manual trigger from GitHub

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install Puppeteer browser
        run: npx puppeteer browsers install chrome

      - name: Send daily email
        run: node scripts/dailyEmail.js
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SITE_URL: https://digitalcredityield.com
